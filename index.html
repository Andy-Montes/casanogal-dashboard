<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Nogal · Sistema clínico</title>
<meta name="description" content="Sistema clínico Casa Nogal: agenda, fichas, reportes y comunicación con familias para el centro de terapias para autismo.">
<meta name="theme-color" content="#1B6B8A">
<meta property="og:type" content="website">
<meta property="og:title" content="Casa Nogal · Sistema clínico">
<meta property="og:description" content="Agenda semanal, fichas clínicas y consola familiar para Casa Nogal.">
<meta property="og:locale" content="es_CL">
<meta property="og:image" content="https://andy-montes.github.io/casanogal-dashboard/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/modules.css">
<link rel="stylesheet" href="styles/print.css">
</head>
<body>

<!-- HEADER -->
<header class="header" id="appHeader">
  <div class="header-inner">
    <button class="nav-toggle" id="navToggle" type="button" aria-label="Abrir menú de navegación" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <path d="M22 14C16 14 12 18 12 24C12 26 12.5 28 13.5 29.5C11 31 9 34 9 38C9 44 13 48 19 48C20 49.5 22 51 24 51C24 53 25 54 27 54C29 54 31 53 31 51V14C28 14 25 14 22 14Z" stroke="#E8A317" stroke-width="2.5"/>
        <path d="M42 14C48 14 52 18 52 24C52 26 51.5 28 50.5 29.5C53 31 55 34 55 38C55 44 51 48 45 48C44 49.5 42 51 40 51C40 53 39 54 37 54C35 54 33 53 33 51V14C36 14 39 14 42 14Z" stroke="#E8A317" stroke-width="2.5"/>
        <line x1="32" y1="14" x2="32" y2="51" stroke="#E8A317" stroke-width="2.5"/>
        <path d="M18 24C20 22 23 22 25 24" stroke="#E8A317" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M16 36C18 34 21 34 23 36" stroke="#E8A317" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M39 24C41 22 44 22 46 24" stroke="#E8A317" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M41 36C43 34 46 34 48 36" stroke="#E8A317" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">casa<b>nogal</b></span>
        <span class="brand-tag">Sistema clínico</span>
      </div>
    </div>

    <div class="role-switcher" id="roleSwitcher">
      <button class="role-pill active" data-role="coordinacion" aria-label="Ver el sistema como Coordinación super admin" type="button">Coordinación</button>
      <button class="role-pill" data-role="terapeuta" aria-label="Previsualizar la vista de un terapeuta" type="button">Terapeuta</button>
      <button class="role-pill" data-role="padres" aria-label="Abrir la consola de comunicación con familias" type="button">Padres</button>
    </div>

    <div class="header-actions">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="search" placeholder="Buscar niño, terapeuta, sala…">
      </div>
      <button class="icon-btn" title="Notificaciones">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="dot"></span>
      </button>
      <div class="user-chip" id="userChip">
        <span class="user-avatar" id="userAvatar">TC</span>
        <span id="userName">Trinidad</span>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="appSidebar">
    <nav>
      <div class="nav-section" data-section="op">
        <div class="nav-label">Gestión operativa</div>
        <div class="nav-item active" data-module="calendario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendario
          <span class="nav-count" id="navCalCount">—</span>
        </div>
        <div class="nav-item" data-module="fichas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16l3-3 3 3 3-3 3 3z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
          Fichas clínicas
          <span class="nav-count" id="navFichasCount">—</span>
        </div>
        <div class="nav-item" data-module="reportes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
          Reportes y boletas
        </div>
      </div>

      <div class="nav-section" data-section="rec">
        <div class="nav-label">Recursos</div>
        <div class="nav-item" data-module="equipo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Equipo
          <span class="nav-count" id="navEquipoCount">—</span>
        </div>
        <div class="nav-item" data-module="ninos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
          Niños
          <span class="nav-count" id="navNinosCount">—</span>
        </div>
        <div class="nav-item" data-module="salas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Salas
          <span class="nav-count" id="navSalasCount">—</span>
        </div>
      </div>

      <div class="nav-section" data-section="sys">
        <div class="nav-label">Sistema</div>
        <div class="nav-item" data-module="config">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="nav-item" data-module="permisos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Permisos
        </div>
      </div>
    </nav>

    <div class="pendientes" id="pendientesBox">
      <div class="pendientes-head">
        <span class="pendientes-title">Pendientes</span>
        <span class="pendientes-count" id="pendientesCount">0</span>
      </div>
      <div id="pendientesList"></div>
    </div>

    <div class="sidebar-cta">
      <button class="btn-cta" id="newSessionBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva sesión
      </button>
      <div class="sidebar-help" id="sidebarHelpLink">¿Qué es Casa Nogal?</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <!-- Contenido inyectado por JS -->
  </main>
</div>

<!-- Fondo oscuro del cajón de navegación móvil -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- Detail panel (slide-in) -->
<div class="panel-overlay" id="panelOverlay"></div>
<aside class="detail-panel" id="detailPanel" role="dialog" aria-label="Detalle de sesión">
  <div class="panel-header">
    <div class="panel-color-block" id="panelColorBlock">—</div>
    <div class="panel-titles">
      <div class="panel-title" id="panelTitle">—</div>
      <div class="panel-subtitle" id="panelSubtitle">—</div>
    </div>
    <button class="panel-close" id="panelCloseBtn" aria-label="Cerrar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer">
    <button class="btn btn-danger" id="panelDeleteBtn">Eliminar</button>
    <button class="btn btn-secondary" id="panelMoveBtn">Mover</button>
    <button class="btn btn-primary" id="panelEditBtn">Editar</button>
  </div>
</aside>

<!-- Modal de creación/edición -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-label="Nueva sesión">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nueva sesión</div>
      <div class="modal-sub" id="modalSub">Completa los datos. La validación de conflictos es automática.</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn">Crear sesión</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status">
  <span id="toastMsg"></span>
</div>

<script src="js/state.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/calendar.js"></script>
<script src="js/panel.js"></script>
<script src="js/modal.js"></script>
<script src="js/fichas.js"></script>
<script src="js/reportes.js"></script>
<script src="js/recursos.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/pdf-padres.js"></script>
<script src="js/comunicacion.js"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script src="js/main.js"></script>
</body>
</html>
